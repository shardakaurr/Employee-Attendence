<div class="login-container">

  <div class="login-card">

    <h1>
      Employee Attrition
      <br>
      System
    </h1>

    <p>
      Welcome Back 
    </p>

    <!-- Username -->

    <input
      type="text"
      placeholder="Enter Username"
      [(ngModel)]="username"
    >

    <!-- Password -->

    <input
      type="password"
      placeholder="Enter Password"
      [(ngModel)]="password"
    >

    <!-- Button -->

    <button
      (click)="login()"
    >

      Login

    </button>

  </div>

</div>
