<div class="login-container">

  <div class="login-box">

    <h2>Employee Attrition System</h2>

    <input
      type="text"
      placeholder="Enter Username"
      [(ngModel)]="username"
    />

    <input
      type="password"
      placeholder="Enter Password"
      [(ngModel)]="password"
    />

    <button (click)="login()">
      Login
    </button>

  </div>

</div>
