<div class="survey-container">

  <!-- AFTER SUBMIT -->

  <div
    class="survey-card"
    *ngIf="surveySubmitted"
  >

    <h1>
      Thank You 😄
    </h1>

    <p
      style="
        text-align:center;
        font-size:18px;
      "
    >

      You already submitted
      the survey.

    </p>

  </div>



  <!-- SURVEY FORM -->

  <div
    class="survey-card"
    *ngIf="!surveySubmitted"
  >

    <h1>
      Employee Survey
    </h1>



    <!-- Job Satisfaction -->

    <label>
      Job Satisfaction
    </label>

    <div class="radio-group">

      <label>
        <input
          type="radio"
          name="satisfaction"
          [value]="1"
          [(ngModel)]="jobSatisfaction"
        >
        Excellent
      </label>

      <label>
        <input
          type="radio"
          name="satisfaction"
          [value]="2"
          [(ngModel)]="jobSatisfaction"
        >
        Good
      </label>

      <label>
        <input
          type="radio"
          name="satisfaction"
          [value]="3"
          [(ngModel)]="jobSatisfaction"
        >
        Average
      </label>

      <label>
        <input
          type="radio"
          name="satisfaction"
          [value]="4"
          [(ngModel)]="jobSatisfaction"
        >
        Poor
      </label>

    </div>



    <!-- Work Pressure -->

    <label>
      Work Pressure
    </label>

    <div class="radio-group">

      <label>
        <input
          type="radio"
          name="pressure"
          [value]="1"
          [(ngModel)]="workPressure"
        >
        Low
      </label>

      <label>
        <input
          type="radio"
          name="pressure"
          [value]="2"
          [(ngModel)]="workPressure"
        >
        Medium
      </label>

      <label>
        <input
          type="radio"
          name="pressure"
          [value]="3"
          [(ngModel)]="workPressure"
        >
        High
      </label>

    </div>



    <!-- Benefits -->

    <label>
      Benefits You Use
    </label>

    <div class="checkbox-group">

      <label>

        <input
          type="checkbox"
          (change)="toggleBenefit('Health Insurance',$event)"
        >

        Health Insurance

      </label>

      <label>

        <input
          type="checkbox"
          (change)="toggleBenefit('Remote Work',$event)"
        >

        Remote Work

      </label>

      <label>

        <input
          type="checkbox"
          (change)="toggleBenefit('Bonus',$event)"
        >

        Bonus

      </label>

    </div>



    <!-- Manager Support -->

    <label>
      Manager Support
    </label>

    <select
      [(ngModel)]="managerSupport"
    >

      <option [ngValue]="0">
        Select
      </option>

      <option [ngValue]="1">
        Excellent
      </option>

      <option [ngValue]="2">
        Good
      </option>

      <option [ngValue]="3">
        Average
      </option>

      <option [ngValue]="4">
        Poor
      </option>

    </select>



    <!-- Leave Company -->

    <label>
      Are you thinking about leaving company?
    </label>

    <div class="radio-group">

      <label>

        <input
          type="radio"
          name="leaveCompany"
          [value]="true"
          [(ngModel)]="leaveCompany"
        >

        Yes

      </label>

      <label>

        <input
          type="radio"
          name="leaveCompany"
          [value]="false"
          [(ngModel)]="leaveCompany"
        >

        No

      </label>

    </div>



    <!-- Suggestions -->

    <label>
      Suggestions
    </label>

    <textarea
      [(ngModel)]="suggestions"
    ></textarea>



    <!-- Submit -->

    <button
      (click)="submitSurvey()"
    >

      Submit Survey

    </button>

  </div>

</div>
