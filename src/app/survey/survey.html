<div class="survey-container">

  <h1>Employee Survey</h1>

  <div class="question-box">

    <label>
      1. Are you satisfied with your job?
    </label>

    <select [(ngModel)]="answer1">

      <option value="">Select</option>

      <option value="Yes">Yes</option>

      <option value="No">No</option>

    </select>

  </div>

  <div class="question-box">

    <label>
      2. Do you feel valued at work?
    </label>

    <select [(ngModel)]="answer2">

      <option value="">Select</option>

      <option value="Yes">Yes</option>

      <option value="No">No</option>

    </select>

  </div>

  <div class="question-box">

    <label>
      3. Any suggestions?
    </label>

    <textarea
      [(ngModel)]="answer3"
      rows="5">
    </textarea>

  </div>

  <button (click)="submitSurvey()">
    Submit Survey
  </button>

</div>
